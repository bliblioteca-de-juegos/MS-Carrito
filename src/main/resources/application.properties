server.port=8083
spring.application.name=MS-Carrito

spring.datasource.url=jdbc:mysql://localhost:3306/carrito_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true

ms.juegos.url=http://localhost:8081
ms.usuarios.url=http://localhost:8082
